
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Don't print a new line at the start of the prompt
add_newline = true

# Use custom format
format = """
[╭─](white) $os$directory$package$java$python$git_branch$git_status$fill$battery$cmd_duration$time
[╰─](white) $character """

# Use custom format
#format = """
#[╭─](white)$username$hostname in $directory$package$java$python$git_branch$battery$cmd_duration
#[╰─](white)$character """

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

# Username settings
[username]
show_always = true
style_root = "bold red"
style_user = "bold yellow"
format = "[$user]($style) "
disabled = false

# Hostname settings
[hostname]
ssh_only = false
format =  "on [$hostname](bold red)"
trim_at = ".companyname.com"
disabled = false

[os]
disabled = false

[os.symbols]
Alpine = " "
Amazon = " "
Android = " "
Arch = " "
CentOS = " "
Debian = " "
DragonFly = " "
Emscripten = " "
EndeavourOS = " "
Fedora = " "
FreeBSD = " "
Garuda = "﯑ "
Gentoo = " "
HardenedBSD = "ﲊ "
Illumos = " "
Linux = " "
Macos = " "
Manjaro = " "
Mariner = " "
MidnightBSD = " "
Mint = " "
NetBSD = " "
NixOS = " "
OpenBSD = " "
openSUSE = " "
OracleLinux = " "
Pop = " "
Raspbian = " "
Redhat = " "
RedHatEnterprise = " "
Redox = " "
Solus = "ﴱ "
SUSE = " "
Ubuntu = " "
Unknown = " "
Windows = " "

# Directory indicator
[directory]
read_only = "󰌾 "
style = "bold cyan"
read_only_style = "red"
truncation_length = 8
truncation_symbol = "…/"
format = "[$read_only]($read_only_style)[$path]($style) "
disabled = false

# Package Version Config
[package]
format = "via [ $version](208 bold) "

# Java settings
[java]
symbol = " "
style = "red dimmed"
format = "via [${symbol}${version}]($style) "

# Python settings
[python]
symbol = " "
style = "yellow bold"
python_binary = "python3"
pyenv_version_name = true

# git settings
#[git_branch]
#symbol = " "
#format = '[ $symbol $branch ]($style)'
#truncation_length = 4
#truncation_symbol = ""

#[git_status]
#style = "bold fg:#f38ba8"
# format = '[($all_status$ahead_behind )]($style)'

# git: [master|+ 1]
[git_branch]
symbol = " "
format = " [$symbol $branch ]($style)"
style = "fg:#f38ba8"
only_attached = true

[git_commit]
format = " [$hash]($style)"
style = "fg:#f38ba8"
only_detached = true

[git_state]
format = "[|$state:$progress_current/$progress_total]($style)"
style = "fg:#f38ba8"

[git_status]
format = "[(\\[$conflicted$staged$modified$deleted$renamed$untracked$stashed$ahead_behind\\])]($style)"
style = "fg:#f38ba8"

ahead    = "↑${count}($style)"
diverged = "↑${ahead_count}↓${behind_count}"
behind   = "↓${count}"

conflicted = "[x$count]($style)"
staged     = "[+$count]($style)"
modified   = "[+$count]($style)"
deleted    = "[-$count]($style)"
renamed    = "[»$count]($style)"
untracked  = "[?$count]($style)"
stashed    = "[⚑$count]($style)"




# Fill
[fill]
style = 'green'
symbol = " "
disabled = false

# Battery information
[battery]
full_symbol = "󰁹"
charging_symbol = "󰂄"
discharging_symbol = "󰂎"

[[battery.display]]
threshold = 10
style = "bold red"

# cmd_duration config
[cmd_duration]
show_milliseconds = true
style = "bold yellow"
format = "took: [$duration]($style) "

# Charakter config
[character]
format = "$symbol"
success_symbol = "[❯](bold green)"
error_symbol = "[✗](bold red) "
vicmd_symbol = "[❮](bold green)"
disabled = false

#[time]
#format = "[[$time](fg:#cdd6f4)]($style)"
#disabled = false

[time]
disabled = false
time_format = "%H:%M:%S" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[$time ](fg:#cdd6f4 bg:#1d2230)]($style)'
#format = '[[  $time ](fg:#cdd6f4 bg:#1d2230)]($style)'
